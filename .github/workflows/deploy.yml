name: Deploy Kakeibo App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Create env.dart
        run: |
          mkdir -p lib
          cat > lib/env.dart << 'EOF'
          class Env {
            static const supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href="/kakeibo-app/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
